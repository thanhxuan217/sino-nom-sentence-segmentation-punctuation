<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So sánh lỗi Dấu Câu (Punctuation Visualizer)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9;}
        h2 { text-align: center; color: #333; }
        .container { display: flex; flex-direction: column; gap: 15px; max-width: 1000px; margin: 0 auto;}
        
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #555;}
        textarea { 
            width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; 
            border-radius: 5px; font-size: 16px; resize: vertical; font-family: inherit;
        }
        
        button {
            padding: 12px 20px; font-size: 16px; font-weight: bold; color: white;
            background-color: #007bff; border: none; border-radius: 5px; cursor: pointer;
            transition: background-color 0.3s; align-self: center;
        }
        button:hover { background-color: #0056b3; }

        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap;}
        .legend span { padding: 5px 10px; border-radius: 4px; font-size: 14px; border: 1px solid #ccc;}

        #result { 
            margin-top: 20px; padding: 20px; border: 1px solid #ddd; 
            border-radius: 8px; background-color: white; 
            line-height: 2.2; font-size: 20px; word-wrap: break-word;
        }
        
        .char { display: inline-block; color: #333; }
        .punc { display: inline-block; font-weight: bold; margin: 0 2px; }
        
        /* Màu sắc cho từng loại lỗi */
        .match { color: #28a745; } /* Xanh lá: Đúng */
        .missing { background-color: #f8d7da; color: #dc3545; padding: 0 4px; border-radius: 3px; text-decoration: line-through; } /* Đỏ: Thiếu */
        .extra { background-color: #fff3cd; color: #ffc107; padding: 0 4px; border-radius: 3px; } /* Vàng: Thừa */
        .wrong { background-color: #cce5ff; color: #004085; padding: 0 4px; border-radius: 3px; } /* Xanh dương: Sai dấu */
        
        .wrong-detail { font-size: 0.6em; color: #888; text-decoration: line-through; margin-left: 2px;}

        .counter { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 14px; color: #666; }
        .counter input { width: 120px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; background-color: #f3f3f3; font-size: 14px; }

    </style>
</head>
<body>

<div class="container">
    <h2>Trực quan hóa Lỗi Dấu câu (Punctuation Errors)</h2>

    <div class="input-group">
        <label>Ground Truth (Thực tế):</label>
        <textarea id="gt">猪除從居不須問，挫瓜相連一處云。俎孤同韻君須記，悲眭三聲傀相親。亦有㭰癏乖中取，若用哹殍鳩內跟借入聲。法迦結裓歌：四聲全該干迦下借短言庚，於裓求傀。如是岡高根鉤歌內參字母關鑰歌訣揭十二攝法迦結岡庚裓高該傀根干鉤歌諸字骨髓分四聲法：平聲平道莫低昂，上聲高呼猛烈强，平去聲分明哀遠道，入聲短促急收藏。明顯四聲等韻圖。</textarea>
        <div class="counter">
            <span>Số ký tự (không tính dấu câu):</span>
            <input id="gt-count" type="text" value="0" readonly>
        </div>
    </div>

    <div class="input-group">
        <label>Prediction (Dự đoán từ model):</label>
        <textarea id="pred">猪除從居不須問挫瓜相連一處云：俎孤同韻君須記悲眭三聲傀相親亦有㭰癏乖中取若用哹殍鳩內跟借入聲。法迦結裓歌四聲全該干迦下借短言庚於裓求傀如是岡高根鉤歌內參字母關鑰歌訣揭十二攝法迦結岡庚裓高該傀根干鉤歌諸字骨髓分四聲法平聲平道莫低昂上聲高呼猛烈强平去聲分明哀遠道入聲短促急收藏明顯四聲等韻圖</textarea>
        <div class="counter">
            <span>Số ký tự (không tính dấu câu):</span>
            <input id="pred-count" type="text" value="0" readonly>
        </div>
    </div>

    <button onclick="visualize()">Bắt đầu So sánh (Visualize)</button>

    <div class="legend">
        <span class="match" style="border-color: #28a745;">Dự đoán Đúng</span>
        <span class="missing">Bị Thiếu dấu (Missing)</span>
        <span class="extra">Bị Thừa dấu (Extra)</span>
        <span class="wrong">Sai loại dấu (Wrong)</span>
    </div>

    <div id="result">
        </div>
</div>

<script>
    // Danh sách các dấu câu phổ biến (có thể thêm bớt tùy ý)
    const punctuations = new Set([
        '，', '。', '：', '；', '！', '？', '、', ',', '.', ':', ';', '!', '?', '—', '…', '「', '」', '『', '』', '（', '）', '《', '》', '〈', '〉', '"', "'"
    ]);

    // Danh s?ch d?u c?u kh?ng t?nh v?o ? ??m (theo labels)
    const countIgnorePunc = new Set(["，","。","：","、","；","？","！"]);

    function countChars(text) {
        let count = 0;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (c.trim() === '') continue;
            if (countIgnorePunc.has(c)) continue;
            count++;
        }
        return count;
    }

    function updateCounts() {
        const gtText = document.getElementById('gt').value;
        const predText = document.getElementById('pred').value;
        document.getElementById('gt-count').value = countChars(gtText);
        document.getElementById('pred-count').value = countChars(predText);
    }


    // Hàm bóc tách chữ Hán và Dấu câu đi kèm phía sau
    function parseText(text) {
        let chars = [];
        let puncs = [];
        
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c.trim() === '') continue; // Bỏ qua khoảng trắng

            if (punctuations.has(c)) {
                if (chars.length > 0) {
                    puncs[chars.length - 1] += c; // Nối dấu câu vào chữ liền trước
                } else {
                    chars.push('');
                    puncs.push(c);
                }
            } else {
                chars.push(c); // Chữ Hán
                puncs.push(''); // Dấu câu rỗng khởi tạo
            }
        }
        return { chars, puncs };
    }

    function visualize() {
        let gtText = document.getElementById('gt').value;
        let predText = document.getElementById('pred').value;

        let gt = parseText(gtText);
        let pred = parseText(predText);

        let html = '';
        
        // Cần đảm bảo so sánh cùng độ dài chữ Hán
        let len = Math.max(gt.chars.length, pred.chars.length);

        for (let i = 0; i < len; i++) {
            let c = gt.chars[i] || pred.chars[i] || ''; 
            let pGT = gt.puncs[i] || '';
            let pPred = pred.puncs[i] || '';

            html += `<span class="char">${c}</span>`;

            if (pGT === pPred) {
                // Đúng hoàn toàn
                if (pGT !== '') {
                    html += `<span class="punc match">${pGT}</span>`;
                }
            } else {
                // Có sự khác biệt
                if (pGT !== '' && pPred === '') {
                    // Mất dấu (Model không predict ra)
                    html += `<span class="punc missing" title="Bị thiếu">${pGT}</span>`;
                } else if (pGT === '' && pPred !== '') {
                    // Thừa dấu (Model bị ảo giác đẻ thêm dấu)
                    html += `<span class="punc extra" title="Bị thừa">${pPred}</span>`;
                } else {
                    // Sai loại dấu (VD: Nhầm dấu phẩy thành dấu chấm)
                    html += `<span class="punc wrong" title="Đúng ra là: ${pGT}">${pPred}<span class="wrong-detail">${pGT}</span></span>`;
                }
            }
        }

        document.getElementById('result').innerHTML = html;
        updateCounts();
    }

    // Tự động chạy một lần khi load trang
    window.onload = function() {
        document.getElementById('gt').addEventListener('input', updateCounts);
        document.getElementById('pred').addEventListener('input', updateCounts);
        updateCounts();
        visualize();
    };
</script>

</body>
</html>
